<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-950 text-slate-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to Modfinit Etsy Shop</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'Inter', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 8s linear infinite',
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Instant client-side redirect fallback -->
    <meta http-equiv="refresh" content="1;url=https://modfinit.etsy.com/">
    <script>
        // Trigger redirect as fast as possible in JS
        window.location.href = "https://modfinit.etsy.com/";
    </script>
</head>
<body class="relative flex min-h-full flex-col items-center justify-center overflow-hidden px-6 py-24 sm:py-32 lg:px-8">
    <!-- Premium Gradient Background Orbs -->
    <div class="absolute inset-auto left-1/2 top-1/2 -z-10 h-[400px] w-[400px] -translate-x-1/2 -translate-y-1/2 rounded-full bg-indigo-500/10 blur-[80px] sm:h-[600px] sm:w-[600px] sm:bg-indigo-500/15"></div>
    <div class="absolute inset-auto left-1/3 top-1/3 -z-10 h-[300px] w-[300px] rounded-full bg-fuchsia-500/10 blur-[100px] animate-pulse-slow"></div>

    <div class="text-center max-w-md w-full backdrop-blur-md bg-slate-900/40 p-8 rounded-3xl border border-slate-800/60 shadow-2xl relative">
        <!-- Spinner Ring -->
        <div class="mx-auto flex h-16 w-16 items-center justify-center rounded-full bg-slate-900 border border-slate-800 shadow-inner relative overflow-hidden mb-6">
            <div class="absolute inset-0 rounded-full border-t-2 border-indigo-500 animate-spin"></div>
            <svg class="h-6 w-6 text-indigo-400 animate-pulse-slow" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25" />
            </svg>
        </div>

        <!-- Typography with premium gradient -->
        <h1 class="text-3xl font-extrabold tracking-tight text-white sm:text-4xl bg-gradient-to-r from-indigo-200 via-slate-100 to-fuchsia-200 bg-clip-text text-transparent">
            modfinit
        </h1>
        <p class="mt-4 text-base leading-7 text-slate-400 font-light">
            We are redirecting you to our new shop on Etsy.
        </p>

        <!-- Button Link -->
        <div class="mt-8">
            <a href="https://modfinit.etsy.com/" class="inline-flex items-center gap-x-2 rounded-xl bg-gradient-to-r from-indigo-500 to-fuchsia-500 px-6 py-3.5 text-sm font-semibold text-white shadow-lg hover:from-indigo-600 hover:to-fuchsia-600 transition-all duration-300 hover:scale-[1.02] active:scale-[0.98] focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">
                Go to Etsy Shop
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
                </svg>
            </a>
        </div>

        <p class="mt-6 text-xs text-slate-500 font-light">
            If you are not redirected automatically within 3 seconds, click the button above.
        </p>
    </div>
</body>
</html>
